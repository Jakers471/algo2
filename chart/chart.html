<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>volume_profile_algo — chart</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      height: 100%;
      background: #0e1117;
      color: #d1d4dc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #1c2230;
      background: #0b0e14;
    }
    header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #26a69a;
    }
    header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0;
      color: #d1d4dc;
    }
    header .sub {
      font-size: 12px;
      color: #6b7280;
    }
    header .spacer { flex: 1 1 auto; }
    #tf-bar {
      display: flex;
      gap: 4px;
    }
    #tf-bar button {
      font: inherit;
      font-size: 12px;
      color: #9aa4b2;
      background: #10141d;
      border: 1px solid #1c2230;
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      transition: color .12s, background .12s, border-color .12s;
    }
    #tf-bar button:hover { color: #d1d4dc; border-color: #2a3140; }
    #tf-bar button.active {
      color: #0e1117;
      background: #26a69a;
      border-color: #26a69a;
      font-weight: 600;
    }
    #chart-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }
    #chart {
      position: absolute;
      inset: 0;
    }
    /* Floating control panel, upper-left over the chart. */
    #panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 5;
      min-width: 132px;
      padding: 8px;
      background: rgba(11, 14, 20, 0.88);
      border: 1px solid #1c2230;
      border-radius: 8px;
      backdrop-filter: blur(4px);
      font-size: 12px;
      user-select: none;
    }
    #panel .panel-group + .panel-group { margin-top: 8px; }
    #panel label {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      color: #d1d4dc;
    }
    #panel .panel-master { font-weight: 600; }
    #panel .panel-subs {
      margin: 5px 0 0 6px;
      padding-left: 8px;
      border-left: 1px solid #1c2230;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #panel .panel-item { color: #9aa4b2; }
    #panel input[type="checkbox"] {
      width: 13px; height: 13px;
      margin: 0;
      accent-color: #26a69a;
      cursor: pointer;
    }
    #panel .swatch {
      width: 10px; height: 10px;
      border-radius: 2px;
      display: inline-block;
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <span class="dot"></span>
      <h1>volume_profile_algo</h1>
      <span class="sub" id="status">NQ · loading…</span>
      <span class="spacer"></span>
      <div id="tf-bar"></div>
    </header>
    <div id="chart-wrap">
      <div id="chart"></div>
      <div id="panel"></div>
    </div>
  </div>

  <script src="./static/vendor/lightweight-charts.standalone.production.js"></script>
  <script src="./static/js/indicators/registry.js"></script>
  <script src="./static/js/indicators/sessions.js"></script>
  <script src="./static/js/chart.js"></script>
</body>
</html>
