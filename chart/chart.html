<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>volume_profile_algo — chart</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      height: 100%;
      background: #0e1117;
      color: #d1d4dc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #1c2230;
      background: #0b0e14;
    }
    header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #26a69a;
    }
    header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0;
      color: #d1d4dc;
    }
    header .sub {
      font-size: 12px;
      color: #6b7280;
    }
    header .spacer { flex: 1 1 auto; }
    #tf-bar {
      display: flex;
      gap: 4px;
    }
    #tf-bar button {
      font: inherit;
      font-size: 12px;
      color: #9aa4b2;
      background: #10141d;
      border: 1px solid #1c2230;
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      transition: color .12s, background .12s, border-color .12s;
    }
    #tf-bar button:hover { color: #d1d4dc; border-color: #2a3140; }
    #tf-bar button.active {
      color: #0e1117;
      background: #26a69a;
      border-color: #26a69a;
      font-weight: 600;
    }
    #chart {
      flex: 1 1 auto;
      min-height: 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <span class="dot"></span>
      <h1>volume_profile_algo</h1>
      <span class="sub" id="status">NQ · loading…</span>
      <span class="spacer"></span>
      <div id="tf-bar"></div>
    </header>
    <div id="chart"></div>
  </div>

  <script src="./static/vendor/lightweight-charts.standalone.production.js"></script>
  <script src="./static/js/chart.js"></script>
</body>
</html>
