<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>volume_profile_algo — chart</title>
  <style>
    :root {
      color-scheme: dark;
      --pg: #0d0d0d;                    /* page background */
      --s: #1a1a19;                     /* surface (buttons, chart, panel) */
      --ink: #fff;                      /* primary text */
      --ink2: #c3c2b7;                  /* secondary text (warm) */
      --mut: #898781;                   /* muted */
      --ring: rgba(255, 255, 255, 0.10);/* borders */
      --acc: #3987e5;                   /* accent */
      --up: #199e70;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--pg);
      color: var(--ink2);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--ring);
      background: var(--pg);
    }
    header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--up);
    }
    header h1 {
      font-size: 13px;
      font-weight: 650;
      letter-spacing: 0.02em;
      margin: 0;
      color: var(--ink);
    }
    header .sub {
      font-size: 12px;
      color: var(--mut);
    }
    header .spacer { flex: 1 1 auto; }
    #tf-bar {
      display: flex;
      gap: 4px;
    }
    #tf-bar button {
      font: inherit;
      font-size: 12.5px;
      color: var(--ink2);
      background: var(--s);
      border: 1px solid var(--ring);
      border-radius: 7px;
      padding: 5px 11px;
      cursor: pointer;
      transition: color .12s, background .12s, border-color .12s;
    }
    #tf-bar button:hover { color: var(--ink); border-color: rgba(255,255,255,0.2); }
    #tf-bar button.active {
      color: #fff;
      background: var(--acc);
      border-color: var(--acc);
      font-weight: 600;
    }
    #chart-wrap {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
    }
    #chart {
      position: absolute;
      inset: 0;
    }
    /* Floating control panel, upper-left over the chart. */
    #panel {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 5;
      min-width: 150px;
      padding: 8px 9px;
      background: rgba(26, 26, 25, 0.94);
      border: 1px solid var(--ring);
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
      font-size: 11.5px;
      user-select: none;
    }
    #panel .panel-group + .panel-group { margin-top: 8px; }
    #panel label {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      color: var(--ink2);
    }
    #panel .panel-master { font-weight: 600; }
    #panel .panel-subs {
      margin: 5px 0 0 6px;
      padding-left: 8px;
      border-left: 1px solid var(--ring);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #panel .panel-item { color: var(--mut); }
    #panel input[type="checkbox"] {
      width: 13px; height: 13px;
      margin: 0;
      accent-color: var(--acc);
      cursor: pointer;
    }
    #panel .swatch {
      width: 9px; height: 9px;
      border-radius: 2px;
      display: inline-block;
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <span class="dot"></span>
      <h1>volume_profile_algo</h1>
      <span class="sub" id="status">NQ · loading…</span>
      <span class="spacer"></span>
      <div id="tf-bar"></div>
    </header>
    <div id="chart-wrap">
      <div id="chart"></div>
      <div id="panel"></div>
    </div>
  </div>

  <script src="./static/vendor/lightweight-charts.standalone.production.js"></script>
  <script src="./static/js/indicators/registry.js"></script>
  <script src="./static/js/indicators/sessions.js"></script>
  <script src="./static/js/indicators/volume_profile.js"></script>
  <script src="./static/js/session_detail.js"></script>
  <script src="./static/js/chart.js"></script>
</body>
</html>
