# algo_config.yaml — single source of truth for every tunable knob.
# In-depth guide to every section/knob: algo_config.README.md
#
# The backend reads this LIVE (edit it and refresh the chart to see changes — no
# server restart needed). The chart, the indicators, and — once wired up — the
# strategy and backtester all read their parameters from here, so what you see on
# the chart is exactly what the backtest/strategy run on.

# ---- Sessions -------------------------------------------------------------
# Window times are LOCAL clock times in `timezone` (DST-aware). A window may wrap
# past midnight (e.g. Asia 18:00 -> 03:00). Used by the Sessions H/L and Volume
# Profile indicators. `color` is the chart color for that session.
sessions:
  timezone: America/Chicago
  max_sessions: 60            # most-recent session instances to compute/draw
  windows:
    Asia:   { start: "18:00", end: "03:00", color: "#3f8ae0" }
    London: { start: "03:00", end: "08:00", color: "#e0a44e" }
    NY:     { start: "08:00", end: "17:00", color: "#a06ee0" }

# ---- Volume Profile -------------------------------------------------------
# row_size is a FIXED price height per row (e.g. 5.0 points), anchored to an
# absolute price grid — so every row is the same height and rows line up across
# sessions. Smaller row_size = finer resolution (and moves the POC).
volume_profile:
  row_size: 5.0               # price per row (fixed; uniform, aligned bins)
  value_area_pct: 0.50        # volume fraction defining the value area (VAL/VAH)

# ---- Volume (time-based) --------------------------------------------------
# The plain volume histogram: one bar of traded volume under each candle, tinted
# by direction. Colors are presentation (frontend reads them from here); height
# is the fraction of the pane the volume band occupies, pinned to the bottom.
volume:
  up_color: "rgba(25, 158, 112, 0.5)"    # bar color when close >= open
  down_color: "rgba(230, 103, 103, 0.5)" # bar color when close < open
  height_pct: 0.20                        # bottom fraction of the pane it fills

# ---- ATR (Average True Range) ---------------------------------------------
# Volatility indicator: the smoothed true range per bar, in price points. Drawn
# as a line in a lower band of the price pane (like MACD/RSI would be), toggled
# from the control panel. `period` is the Wilder smoothing lookback (the math
# knob); `color` + `height_pct` are presentation (band color + how tall the band
# is, as a fraction of the pane). Experimental.
atr:
  period: 14                  # Wilder smoothing lookback in bars
  color: "#eb6834"            # line color (frontend presentation)
  height_pct: 0.18            # lower-band height as a fraction of the pane

# ---- Moving Averages ------------------------------------------------------
# Each line entry draws one moving average: `type` is sma (simple) or ema
# (exponential — weights recent bars more, hugs price closer); `period` is the
# lookback in bars; `color` its chart color. Add/remove lines freely. `source`
# is the price field averaged: close/open/high/low/hl2/hlc3/ohlc4.
moving_averages:
  source: close
  lines:
    - { type: sma, period: 20,  color: "#4fc3f7" }   # light blue  — fast
    - { type: sma, period: 50,  color: "#ffb74d" }   # orange      — medium
    - { type: sma, period: 100, color: "#f06292" }   # rose        — slower
    - { type: sma, period: 200, color: "#ba68c8" }   # purple      — slow

# ---- Strategy pipeline ----------------------------------------------------
# Mirrors src/strategy/: readings -> snapshot -> score -> decide -> manage.
# `use` picks which VERSION of each swappable stage runs — change one word to
# swap that stage, nothing else moves. Per-version knobs (weights/thresholds)
# get added here LATER, once defined. For now score/decide/manage are stubs.
strategy:
  use:
    scorer:  v1
    decider: va_breakout
    manager: fixed

  # readings — knobs for deriving facts from raw indicators (the SNAPSHOT base).
  readings:
    volume_window: 20        # baseline lookback: rvol, delta, and vexp's slow avg
    volume_fast: 3           # vexp fast avg (short-term); vexp = avg(fast) / avg(window)

# ---- Chart defaults -------------------------------------------------------
chart:
  symbol: NQ
  timeframe: 5m
  limit: 10000                # bars loaded per timeframe
